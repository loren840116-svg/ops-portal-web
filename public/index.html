<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreatorDB | Ops Portal Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .bg-gradient { background: radial-gradient(circle at top left, #1e293b 0%, #0f172a 100%); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.5); }
        .sidebar-item { transition: all 0.2s; border-radius: 12px; }
        .sidebar-item:hover { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .active-nav { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border-left: 4px solid #3b82f6; }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gradient min-h-screen">

    <div id="loginPage" class="flex items-center justify-center min-h-screen p-4">
        <div class="glass p-10 rounded-3xl shadow-2xl w-full max-w-md text-center">
            <div class="mb-8">
                <div class="inline-block p-4 rounded-2xl bg-blue-600/20 mb-4">
                    <i class="fas fa-rocket text-4xl text-blue-500"></i>
                </div>
                <h1 class="text-3xl font-bold tracking-tight text-white">Ops Portal <span class="text-blue-500">Pro</span></h1>
                <p class="text-slate-400 mt-2">Enterprise Resource Management</p>
            </div>
            
            <div class="space-y-4">
                <div class="relative text-left">
                    <label class="text-xs font-semibold text-slate-400 ml-1 uppercase tracking-wider">Work Email</label>
                    <input type="email" id="emailInput" placeholder="name@creatordb.app" 
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white">
                </div>
                <button onclick="handleLogin()" id="loginBtn" class="w-full btn-primary text-white font-bold py-3 rounded-xl">
                    Authorize Access
                </button>
                <p id="loginError" class="text-red-400 text-sm mt-3 hidden italic">
                    <i class="fas fa-exclamation-circle mr-1"></i> Access Denied: Email not recognized.
                </p>
            </div>
        </div>
    </div>

    <div id="mainInterface" class="flex min-h-screen hidden">
        <aside class="w-72 glass m-4 rounded-3xl p-6 flex flex-col shadow-2xl">
            <div class="flex items-center space-x-3 mb-10 px-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                    <i class="fas fa-shield-alt text-sm"></i>
                </div>
                <span class="text-xl font-bold tracking-tighter text-white">CREATOR<span class="text-blue-500">DB</span></span>
            </div>
            
            <nav class="flex-1 space-y-2">
                <button onclick="showSection('memberList')" id="nav-members" class="sidebar-item active-nav w-full flex items-center space-x-3 p-4">
                    <i class="fas fa-users-viewfinder"></i>
                    <span class="font-medium">Member Directory</span>
                </button>
                <button onclick="showSection('dashboard')" id="nav-dashboard" class="sidebar-item w-full flex items-center space-x-3 p-4 hidden">
                    <i class="fas fa-chart-pie"></i>
                    <span class="font-medium">Analytics Engine</span>
                </button>
            </nav>

            <div class="mt-auto pt-6 border-t border-slate-700">
                <div class="flex items-center space-x-3 p-2 bg-slate-800/40 rounded-2xl mb-4">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-600 to-purple-600 flex items-center justify-center font-bold text-white" id="userInitial">U</div>
                    <div class="overflow-hidden">
                        <p id="userName" class="text-sm font-bold truncate text-white">User Name</p>
                        <p id="userRole" class="text-xs text-slate-500 uppercase tracking-tighter">Role</p>
                    </div>
                </div>
                <button onclick="logout()" class="w-full text-slate-400 hover:text-red-400 text-sm flex items-center justify-center p-2 transition">
                    <i class="fas fa-power-off mr-2"></i> Sign Out
                </button>
            </div>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto">
            <div id="section-memberList" class="section animate-fade-in">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-bold text-white tracking-tight">Member Directory</h2>
                    <div class="text-sm text-slate-400 bg-slate-800/50 px-4 py-2 rounded-full border border-slate-700">
                        <i class="fas fa-sync-alt mr-2"></i> Real-time Sync Active
                    </div>
                </div>
                
                <div class="glass rounded-3xl overflow-hidden shadow-2xl">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-800/50 text-slate-400 text-xs uppercase tracking-widest">
                                <th class="px-8 py-5 font-semibold">Identity</th>
                                <th class="px-8 py-5 font-semibold">Contact Email</th>
                                <th class="px-8 py-5 font-semibold text-center">Status / Role</th>
                            </tr>
                        </thead>
                        <tbody id="memberTableBody" class="divide-y divide-slate-700/50">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="section-dashboard" class="section hidden animate-fade-in">
                <h2 class="text-3xl font-bold text-white tracking-tight mb-8">Analytics Engine</h2>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="glass p-8 rounded-3xl lg:col-span-1 shadow-2xl">
                        <h3 class="text-lg font-bold mb-6 text-slate-200"><i class="fas fa-chart-donut mr-2 text-blue-500"></i>Role Allocation</h3>
                        <canvas id="roleChart"></canvas>
                    </div>
                    <div class="lg:col-span-2 grid grid-cols-2 gap-4">
                        <div class="glass p-6 rounded-3xl flex flex-col justify-center items-center">
                            <p class="text-slate-400 text-sm uppercase">Total Ops</p>
                            <p id="stat-total" class="text-5xl font-bold text-white mt-2">--</p>
                        </div>
                        <div class="glass p-6 rounded-3xl flex flex-col justify-center items-center border-l-4 border-blue-500">
                            <p class="text-slate-400 text-sm uppercase">Active Roles</p>
                            <p id="stat-roles" class="text-5xl font-bold text-blue-500 mt-2">--</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ⚠️ 請在此處更換為你的 Google Apps Script API 網址
        const API_URL = "https://script.google.com/macros/s/AKfycbyRSBQEwNA1BUmbik5n7tpDzJPpZ9Fyh874BFiU2cHnVM5v4yk3HgNrNrfd2MxeRZj8/exec"; 

        let currentUser = null;
        let allMembers = [];

        async function handleLogin() {
            const email = document.getElementById('emailInput').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('loginError');

            if (!email) return;

            btn.disabled = true;
            btn.innerHTML = '<div class="w-5 h-5 border-2 loader rounded-full mx-auto"></div>';
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch(`${API_URL}?action=getMembers`);
                const data = await response.json();
                allMembers = data;

                const user = data.find(m => m.Email.toLowerCase() === email.toLowerCase());

                if (user) {
                    currentUser = user;
                    enterPortal();
                } else {
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                console.error("Login Error:", error);
                alert("Critical API Failure. Please check CORS settings and API URL.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Authorize Access";
            }
        }

        function enterPortal() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainInterface').classList.remove('hidden');
            document.getElementById('userName').innerText = currentUser.Name;
            document.getElementById('userRole').innerText = currentUser.Role;
            document.getElementById('userInitial').innerText = currentUser.Name.charAt(0).toUpperCase();

            if (['agencyadmin', 'cm'].includes(currentUser.Role.toLowerCase())) {
                document.getElementById('nav-dashboard').classList.remove('hidden');
            }

            renderMemberList();
            renderCharts();
        }

        function renderMemberList() {
            const tbody = document.getElementById('memberTableBody');
            tbody.innerHTML = allMembers.map(m => `
                <tr class="hover:bg-blue-600/5 transition group">
                    <td class="px-8 py-5">
                        <div class="flex items-center space-x-3">
                            <div class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-xs font-bold text-blue-400">
                                ${m.Name.charAt(0)}
                            </div>
                            <span class="font-medium text-slate-200 group-hover:text-blue-400 transition">${m.Name}</span>
                        </div>
                    </td>
                    <td class="px-8 py-5 text-slate-400 text-sm font-mono">${m.Email}</td>
                    <td class="px-8 py-5 text-center">
                        <span class="px-4 py-1.5 rounded-xl bg-blue-500/10 text-blue-400 text-xs font-bold border border-blue-500/20 uppercase">
                            ${m.Role}
                        </span>
                    </td>
                </tr>
            `).join('');
            document.getElementById('stat-total').innerText = allMembers.length;
        }

        function renderCharts() {
            const roles = allMembers.reduce((acc, curr) => {
                acc[curr.Role] = (acc[curr.Role] || 0) + 1;
                return acc;
            }, {});

            document.getElementById('stat-roles').innerText = Object.keys(roles).length;

            const ctx = document.getElementById('roleChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(roles),
                    datasets: [{
                        data: Object.values(roles),
                        backgroundColor: ['#3b82f6', '#8b5cf6', '#06b6d4', '#f43f5e'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    plugins: { 
                        legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 20 } }
                    },
                    cutout: '70%'
                }
            });
        }

        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active-nav'));
            
            document.getElementById('section-' + sectionId).classList.remove('hidden');
            document.getElementById('nav-' + (sectionId === 'memberList' ? 'members' : 'dashboard')).classList.add('active-nav');
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
