<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreatorDB Ops Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .hidden { display: none; }
        .active-link { background-color: #374151; border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="loginPage" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-lg shadow-md w-96 text-center">
            <h1 class="text-2xl font-bold mb-6 text-gray-800">CreatorDB Ops Portal</h1>
            <p class="text-sm text-gray-600 mb-4">請使用您的 Work Email 登入</p>
            <input type="email" id="emailInput" placeholder="name@creatordb.app" class="w-full p-2 border border-gray-300 rounded mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">登入</button>
            <p id="loginError" class="text-red-500 text-xs mt-3 hidden">Access Denied: Email 不在名單內</p>
        </div>
    </div>

    <div id="mainInterface" class="flex min-h-screen hidden">
        <div class="w-64 bg-gray-900 text-white p-6 shadow-xl">
            <div class="text-xl font-bold mb-8 border-b border-gray-700 pb-4">Ops Portal</div>
            <nav class="space-y-2">
                <a href="#" onclick="showSection('memberList')" class="block p-3 rounded hover:bg-gray-800 transition">👥 Member List</a>
                <a href="#" id="nav-dashboard" onclick="showSection('dashboard')" class="block p-3 rounded hover:bg-gray-800 transition hidden">📊 Team Dashboard</a>
                <a href="#" onclick="logout()" class="block p-3 rounded text-gray-400 hover:text-white mt-10">🚪 Logout</a>
            </nav>
            <div class="mt-20 p-4 bg-gray-800 rounded-lg">
                <p class="text-xs text-gray-400">Current User:</p>
                <p id="userName" class="text-sm font-medium text-blue-400"></p>
            </div>
        </div>

        <div class="flex-1 p-10">
            <div id="section-memberList" class="section">
                <h2 class="text-3xl font-bold mb-6 text-gray-800">Member List</h2>
                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <table class="min-w-full leading-normal">
                        <thead>
                            <tr class="bg-gray-50 text-gray-600 uppercase text-sm">
                                <th class="px-5 py-3 text-left">Name</th>
                                <th class="px-5 py-3 text-left">Email</th>
                                <th class="px-5 py-3 text-left">Role</th>
                            </tr>
                        </thead>
                        <tbody id="memberTableBody" class="text-gray-700">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="section-dashboard" class="section hidden">
                <h2 class="text-3xl font-bold mb-6 text-gray-800">Team Performance</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="bg-white p-6 rounded-lg shadow">
                        <h3 class="text-lg font-semibold mb-4">Role Distribution</h3>
                        <canvas id="roleChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ 這裡請填入你的 Google Apps Script 網址
        const API_URL = "https://script.google.com/u/1/home/projects/1GkdgSjEj70VeGbPZ2Q9qBPoOzLbFMtN09EGCYxYlQ1seSAltyIiKQ5yw/edit"; 

        let currentUser = null;
        let allMembers = [];

        async function handleLogin() {
            const email = document.getElementById('emailInput').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('loginError');

            if (!email) return;

            btn.disabled = true;
            btn.innerText = "驗證中...";
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch(`${API_URL}?action=getMembers`);
                const data = await response.json();
                allMembers = data;

                const user = data.find(m => m.Email.toLowerCase() === email.toLowerCase());

                if (user) {
                    currentUser = user;
                    enterPortal();
                } else {
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                console.error("Login Error:", error);
                alert("無法連線至 API，請檢查 API 網址是否正確。");
            } finally {
                btn.disabled = false;
                btn.innerText = "登入";
            }
        }

        function enterPortal() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainInterface').classList.remove('hidden');
            document.getElementById('userName').innerText = `${currentUser.Name} (${currentUser.Role})`;

            // 權限控制：如果是 Admin 或 CM 才能看到 Dashboard
            if (['agencyadmin', 'cm'].includes(currentUser.Role.toLowerCase())) {
                document.getElementById('nav-dashboard').classList.remove('hidden');
            }

            renderMemberList();
            renderCharts();
        }

        function renderMemberList() {
            const tbody = document.getElementById('memberTableBody');
            tbody.innerHTML = allMembers.map(m => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="px-5 py-4">${m.Name}</td>
                    <td class="px-5 py-4 text-gray-500">${m.Email}</td>
                    <td class="px-5 py-4">
                        <span class="px-2 py-1 bg-blue-100 text-blue-700 rounded-full text-xs">${m.Role}</span>
                    </td>
                </tr>
            `).join('');
        }

        function renderCharts() {
            const ctx = document.getElementById('roleChart').getContext('2d');
            
            // 計算各角色人數
            const roles = allMembers.reduce((acc, curr) => {
                acc[curr.Role] = (acc[curr.Role] || 0) + 1;
                return acc;
            }, {});

            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: Object.keys(roles),
                    datasets: [{
                        data: Object.values(roles),
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444']
                    }]
                }
            });
        }

        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById('section-' + sectionId).classList.remove('hidden');
        }

        function logout() {
            location.reload();
        }
    </script>
</body>
</html>
