<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreatorDB | Ops Portal Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4); }
        .sidebar-item { transition: all 0.2s; border-radius: 12px; cursor: pointer; }
        .active-nav { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border-left: 4px solid #3b82f6; }
        .loader { border-top-color: #3b82f6; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <div id="loginPage" class="flex items-center justify-center min-h-screen p-6">
        <div class="glass p-10 rounded-3xl shadow-2xl w-full max-w-md text-center">
            <div class="mb-8">
                <div class="inline-block p-4 rounded-2xl bg-blue-600/20 mb-4">
                    <i class="fas fa-bolt text-4xl text-blue-500"></i>
                </div>
                <h1 class="text-3xl font-bold text-white">Ops Portal <span class="text-blue-500 text-sm align-top">PRO</span></h1>
                <p class="text-slate-400 mt-2 italic">CreatorDB Enterprise Management</p>
            </div>
            
            <div class="space-y-5 text-left">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Email Authorization</label>
                    <input type="email" id="emailInput" placeholder="name@creatordb.app" 
                        class="w-full bg-slate-900/60 border border-slate-700 rounded-xl px-4 py-4 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white transition-all">
                </div>
                <button onclick="handleLogin()" id="loginBtn" class="w-full btn-primary text-white font-bold py-4 rounded-xl shadow-lg">
                    Access System
                </button>
                <div id="loginError" class="hidden bg-red-500/10 border border-red-500/50 p-3 rounded-lg text-red-400 text-sm text-center">
                    <i class="fas fa-user-slash mr-2"></i> Access Denied.
                </div>
            </div>
        </div>
    </div>

    <div id="mainInterface" class="hidden flex min-h-screen">
        <nav class="w-72 glass m-4 rounded-3xl p-6 flex flex-col">
            <div class="flex items-center space-x-3 mb-12 px-2">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="fas fa-database text-white"></i>
                </div>
                <span class="text-2xl font-black tracking-tighter text-white italic">CREATOR<span class="text-blue-500">DB</span></span>
            </div>
            
            <div class="space-y-3 flex-1">
                <div onclick="showSection('memberList')" id="nav-members" class="sidebar-item active-nav flex items-center space-x-4 p-4">
                    <i class="fas fa-address-book"></i>
                    <span class="font-semibold">Directory</span>
                </div>
                <div onclick="showSection('dashboard')" id="nav-dashboard" class="sidebar-item hidden flex items-center space-x-4 p-4">
                    <i class="fas fa-chart-line"></i>
                    <span class="font-semibold">Analytics</span>
                </div>
            </div>

            <div class="mt-auto pt-6 border-t border-slate-800">
                <div class="flex items-center space-x-3 p-3 bg-slate-800/50 rounded-2xl mb-4">
                    <div id="userInitial" class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white font-bold">?</div>
                    <div class="truncate">
                        <p id="userName" class="text-sm font-bold text-white truncate">Loading...</p>
                        <p id="userRole" class="text-[10px] text-blue-400 uppercase font-black tracking-widest">Role</p>
                    </div>
                </div>
                <button onclick="logout()" class="w-full text-slate-500 hover:text-white transition py-2 text-sm">
                    <i class="fas fa-sign-out-alt mr-2"></i> Sign Out
                </button>
            </div>
        </nav>

        <main class="flex-1 p-8">
            <div id="section-memberList" class="section">
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <h2 class="text-4xl font-extrabold text-white">Directory</h2>
                        <p class="text-slate-500 mt-1">Manage and view all team members across departments.</p>
                    </div>
                    <div class="bg-blue-500/10 text-blue-400 px-4 py-2 rounded-xl text-xs font-bold border border-blue-500/20">
                        <i class="fas fa-circle text-[8px] mr-2 animate-pulse"></i> LIVE SYSTEM
                    </div>
                </div>
                
                <div class="glass rounded-3xl overflow-hidden shadow-2xl">
                    <table class="w-full">
                        <thead class="bg-slate-800/40 text-slate-500 text-[10px] uppercase font-black tracking-[0.2em]">
                            <tr>
                                <th class="px-8 py-5 text-left">Member</th>
                                <th class="px-8 py-5 text-left">Contact Info</th>
                                <th class="px-8 py-5 text-center">Permission</th>
                            </tr>
                        </thead>
                        <tbody id="memberTableBody" class="divide-y divide-slate-800">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="section-dashboard" class="section hidden">
                <h2 class="text-4xl font-extrabold text-white mb-8">Analytics Engine</h2>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="glass p-8 rounded-3xl lg:col-span-1 flex flex-col items-center">
                        <h3 class="text-sm font-black text-slate-500 uppercase tracking-widest mb-8 self-start">Role Distribution</h3>
                        <div class="w-full max-w-[250px]">
                            <canvas id="roleChart"></canvas>
                        </div>
                    </div>
                    <div class="lg:col-span-2 grid grid-cols-2 gap-6">
                        <div class="glass p-8 rounded-3xl">
                            <i class="fas fa-user-friends text-blue-500 text-2xl mb-4"></i>
                            <p class="text-slate-500 text-xs font-black uppercase">Total Headcount</p>
                            <p id="stat-total" class="text-6xl font-black text-white mt-2">0</p>
                        </div>
                        <div class="glass p-8 rounded-3xl border-r-4 border-blue-500">
                            <i class="fas fa-project-diagram text-indigo-500 text-2xl mb-4"></i>
                            <p class="text-slate-500 text-xs font-black uppercase">Active Segments</p>
                            <p id="stat-roles" class="text-6xl font-black text-white mt-2">0</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ⚠️ 把你的 Google Apps Script Web App URL 貼在這裡
        const API_URL = "https://script.google.com/macros/s/AKfycbyRSBQEwNA1BUmbik5n7tpDzJPpZ9Fyh874BFiU2cHnVM5v4yk3HgNrNrfd2MxeRZj8/exec"; 

        let currentUser = null;
        let allMembers = [];

        async function handleLogin() {
            const email = document.getElementById('emailInput').value.trim().toLowerCase();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('loginError');

            if (!email) return;

            btn.disabled = true;
            btn.innerHTML = '<div class="w-6 h-6 border-2 loader rounded-full mx-auto"></div>';
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch(`${API_URL}?action=getMembers`, {
                    method: 'GET',
                    redirect: 'follow'
                });

                if (!response.ok) throw new Error('連線失敗，請檢查 API 部署網址。');
                
                allMembers = await response.json();

                if (allMembers.error) throw new Error(allMembers.error);

                const user = allMembers.find(m => m.Email.toLowerCase() === email);

                if (user) {
                    currentUser = user;
                    enterPortal();
                } else {
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                console.error(error);
                alert("🔴 系統連線發生錯誤！\n請確認 API 網址是否正確，且已部署為『所有人』存取。\n\n詳細訊息: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Access System";
            }
        }

        function enterPortal() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainInterface').classList.remove('hidden');
            document.getElementById('userName').innerText = currentUser.Name;
            document.getElementById('userRole').innerText = currentUser.Role;
            document.getElementById('userInitial').innerText = currentUser.Name.charAt(0);

            // 權限判斷：Admin 或 CM 可看 Analytics
            const role = currentUser.Role.toLowerCase();
            if (role.includes('admin') || role === 'cm' || role === 'dir') {
                document.getElementById('nav-dashboard').classList.remove('hidden');
            }

            renderMemberList();
            renderCharts();
        }

        function renderMemberList() {
            const tbody = document.getElementById('memberTableBody');
            tbody.innerHTML = allMembers.map(m => `
                <tr class="hover:bg-blue-600/5 transition group">
                    <td class="px-8 py-5">
                        <div class="flex items-center space-x-4">
                            <div class="w-9 h-9 rounded-xl bg-slate-800 flex items-center justify-center text-blue-400 font-bold border border-slate-700">
                                ${m.Name.charAt(0)}
                            </div>
                            <span class="font-bold text-slate-200 group-hover:text-white transition">${m.Name}</span>
                        </div>
                    </td>
                    <td class="px-8 py-5 text-slate-500 text-sm font-medium tracking-tight">${m.Email}</td>
                    <td class="px-8 py-5 text-center">
                        <span class="px-3 py-1 rounded-lg bg-blue-500/10 text-blue-400 text-[10px] font-black border border-blue-500/20">
                            ${m.Role}
                        </span>
                    </td>
                </tr>
            `).join('');
            document.getElementById('stat-total').innerText = allMembers.length;
        }

        function renderCharts() {
            const roles = allMembers.reduce((acc, curr) => {
                acc[curr.Role] = (acc[curr.Role] || 0) + 1;
                return acc;
            }, {});

            document.getElementById('stat-roles').innerText = Object.keys(roles).length;

            const ctx = document.getElementById('roleChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(roles),
                    datasets: [{
                        data: Object.values(roles),
                        backgroundColor: ['#3b82f6', '#6366f1', '#2dd4bf', '#fbbf24', '#f87171'],
                        borderWidth: 0
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    cutout: '80%',
                    responsive: true
                }
            });
        }

        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active-nav'));
            document.getElementById('section-' + sectionId).classList.remove('hidden');
            document.getElementById('nav-' + (sectionId === 'memberList' ? 'members' : 'dashboard')).classList.add('active-nav');
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
